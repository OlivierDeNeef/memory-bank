services:
  memorybank:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6868:6868"
    volumes:
      - ./data:/data/memorybank
    restart: unless-stopped

  memorybank-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5174:5174"
    volumes:
      - ./data:/data/memorybank
    restart: unless-stopped
    depends_on:
      - memorybank
